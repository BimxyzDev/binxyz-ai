        // Format code blocks
        function formatWithCodeBlocks(text) {
            const codeBlockRegex = /```(\w*)\n([\s\S]*?)```/g;
            let lastIndex = 0;
            let result = '';
            let match;
            
            while ((match = codeBlockRegex.exec(text)) !== null) {
                result += text.substring(lastIndex, match.index);
                
                const lang = match[1] || 'text';
                let code = match[2];
                code = code.replace(/&/g, '&amp;')
                           .replace(/</g, '&lt;')
                           .replace(/>/g, '&gt;');
                
                const blockId = 'cb_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
                
                result += `
                    <div class="code-wrapper" data-id="${blockId}">
                        <div class="code-header">
                            <span class="code-lang">${lang}</span>
                            <div class="code-buttons">
                                <button onclick="window.copyCode('${blockId}')">
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                                    </svg>
                                    Copy
                                </button>
                                <button onclick="window.downloadCode('${blockId}', '${lang}')">
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                        <polyline points="7 10 12 15 17 10"></polyline>
                                        <line x1="12" y1="15" x2="12" y2="3"></line>
                                    </svg>
                                    Download
                                </button>
                            </div>
                        </div>
                        <pre><code>${code}</code></pre>
                    </div>
                `;
                
                lastIndex = match.index + match[0].length;
            }
            
            result += text.substring(lastIndex);
            result = result.replace(/`([^`]+)`/g, '<code class="inline-code">$1</code>');
            result = result.replace(/\n/g, '<br>');
            
            return result;
        }
        
        // Copy function
        window.copyCode = function(blockId) {
            const container = document.querySelector(`.code-wrapper[data-id="${blockId}"]`);
            if (!container) return;
            const codeElem = container.querySelector('code');
            if (!codeElem) return;
            const code = codeElem.textContent;
            
            navigator.clipboard.writeText(code).then(() => {
                const btn = container.querySelector('.code-buttons button:first-child');
                if (btn) {
                    const original = btn.innerHTML;
                    btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg> Copied!';
                    setTimeout(() => { btn.innerHTML = original; }, 1800);
                }
            }).catch(() => alert('Gagal copy'));
        };
        
        // Download function
        window.downloadCode = function(blockId, lang) {
            const container = document.querySelector(`.code-wrapper[data-id="${blockId}"]`);
            if (!container) return;
            const codeElem = container.querySelector('code');
            if (!codeElem) return;
            const code = codeElem.textContent;
            
            const extMap = {
                javascript: 'js', python: 'py', html: 'html', css: 'css',
                json: 'json', bash: 'sh', sql: 'sql', typescript: 'ts',
                jsx: 'jsx', tsx: 'tsx', php: 'php', text: 'txt'
            };
            const ext = extMap[lang.toLowerCase()] || 'txt';
            const filename = `code_${Date.now()}.${ext}`;
            
            const blob = new Blob([code], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            const btn = container.querySelector('.code-buttons button:last-child');
            if (btn) {
                const original = btn.innerHTML;
                btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg> Saved!';
                setTimeout(() => { btn.innerHTML = original; }, 1500);
            }
        };

        // Send message
        async function sendMessage() {
            const text = inputField.value.trim();
            if (!text) return;
            
            sendButton.disabled = true;
            inputField.disabled = true;
            inputField.value = '';
            inputField.style.height = 'auto';
            
            addMessage('user', text);
            showTyping();
            
            try {
                const reply = await getAIResponse(text);
                hideTyping();
                addMessage('ai', reply);
            } catch (err) {
                hideTyping();
                addMessage('ai', `⚠️ Error: ${err.message}\nCoba lagi ya.`);
                console.error(err);
            }
            
            sendButton.disabled = false;
            inputField.disabled = false;
            inputField.focus();
        }
        
        // Event listeners
        sendButton.addEventListener('click', sendMessage);
        inputField.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        inputField.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });
        
        // Close memory panel when clicking outside
        document.addEventListener('click', function(e) {
            const panel = document.getElementById('memoryPanel');
            const indicator = document.getElementById('memoryIndicator');
            if (panel && !panel.contains(e.target) && !indicator.contains(e.target)) {
                panel.classList.remove('show');
            }
        });
        
        // Initialize
        function init() {
            const hasHistory = loadMemory();
            
            // If no history, show welcome
            if (conversationHistory.length === 0) {
                const welcome = `🧠 Halo! Aku Bimxyz AI yang dikembangkan oleh Bima Putra Wardana, dengan memori jangka panjang!\n\nAku ingat semua obrolan kita. Jadi bisa ngobrol kayak teman, ga perlu ngulang terus.\n\n✨ Fitur Memori:\n• 🔍 Ingat nama dan preferensi kamu\n• 📝 Semua percakapan tersimpan di localStorage\n• 🧠 Bisa lanjutin obrolan kapan aja\n• 🗑️ Tombol "Hapus Semua" buat bersihin riwayat\n\nCoba kasih tau nama kamu, atau ceritain sesuatu. Nanti aku bakal ingat! 🚀`;
                addMessage('ai', welcome);
            } else {
                // Show last message summary
                const lastUserMsg = conversationHistory.filter(m => m.role === 'user').pop();
                if (lastUserMsg) {
                    addMessage('ai', `🧠 Aku ingat obrolan kita sebelumnya!\n\nKita terakhir ngobrol tentang: "${lastUserMsg.content.substring(0, 60)}..."\n\nLanjutin yuk! Ada yang mau ditanyakan lagi? 🚀`);
                } else {
                    addMessage('ai', `🧠 Selamat datang kembali!\n\nAku masih ingat semua obrolan kita. Ada yang mau dibahas? 🚀`);
                }
            }
            
            inputField.focus();
        }
        
        init();
    </script>
